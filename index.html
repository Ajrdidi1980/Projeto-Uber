<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle Uber</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 👇 IMPORTANTE -->
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Controle Uber 🚗</h1>

    <!-- MENU -->
    <div class="tabs">
      <button onclick="trocarTela('receitas')">Receitas</button>
      <button onclick="trocarTela('gastos')">Gastos</button>
      <button onclick="trocarTela('resumo')">Resumo</button>
    </div>

    <!-- RECEITAS -->
    <div id="receitas" class="tela">
      <h2>Corridas</h2>

      <input id="desc-receita" placeholder="Descrição" />
      <input id="valor-receita" type="number" placeholder="Valor" />

      <button onclick="addReceita()">Adicionar</button>
      <button id="btn-receita" onclick="addReceita()">Adicionar</button>

      <!-- FILTROS -->
      <!-- FILTROS -->
      <input
        id="filtro-receitas"
        placeholder="Buscar descrição"
        oninput="filtrarReceitas()"
      />

      <input type="date" id="data-inicio" />
      <input type="date" id="data-fim" />

      <button onclick="filtrarPorData()">Filtrar período</button>
      <button onclick="limparFiltros()">Limpar</button>

      <table>
        <tbody id="lista-receitas"></tbody>
      </table>
    </div>

    <!-- GASTOS -->
    <div id="gastos" class="tela">
      <h2>Manutenção</h2>

      <input id="desc-gasto" placeholder="Descrição" />
      <input id="valor-gasto" type="number" placeholder="Valor" />

      <button id="btn-gasto" onclick="addGasto()">Adicionar</button>

      <table>
        <tbody id="lista-gastos"></tbody>
      </table>
    </div>

    <!-- RESUMO -->
    <div id="resumo" class="tela">
      <h2>Resumo</h2>

      <input id="percentual" type="number" placeholder="Reserva (%)" />
      <button onclick="salvarPercentual()">Salvar</button>

      <p>Receitas: R$ <span id="total-receitas">0.00</span></p>
      <p>Gastos: R$ <span id="total-gastos">0.00</span></p>
      <p>Reserva: R$ <span id="reserva">0.00</span></p>

      <h3>Saldo: R$ <span id="saldo">0.00</span></h3>
      <h3>Ganhos por Dia</h3>
      <canvas id="grafico"></canvas>
    </div>
  </body>
</html>
