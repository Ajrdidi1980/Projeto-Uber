<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle Uber</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 👇 IMPORTANTE -->
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="topo">
        <h1>Controle Uber 🚗</h1>
      </header>

      <!-- MENU -->
      <nav class="tabs">
        <button onclick="trocarTela('receitas')">Receitas</button>
        <button onclick="trocarTela('gastos')">Gastos</button>
        <button onclick="trocarTela('resumo')">Resumo</button>
      </nav>

      <!-- RECEITAS -->
      <div id="receitas" class="tela card">
        <h2>Corridas</h2>

        <div class="form">
          <input id="desc-receita" placeholder="Descrição" />
          <input id="valor-receita" type="number" placeholder="R$ 0,00" />
          <button onclick="addReceita()">Adicionar</button>
        </div>

        <div class="filtros">
          <input
            id="filtro-receitas"
            placeholder="Buscar..."
            oninput="filtrarReceitas()"
          />
          <input type="date" id="data-inicio" />
          <input type="date" id="data-fim" />
          <button onclick="filtrarPorData()">Filtrar</button>
          <button id="btn-receita" onclick="limparFiltros()">Limpar</button>
        </div>

        <table>
          <tbody id="lista-receitas"></tbody>
        </table>
      </div>

      <!-- GASTOS -->
      <div id="gastos" class="tela card">
        <h2>Manutenção</h2>

        <div class="form">
          <input id="desc-gasto" placeholder="Descrição" />
          <input id="valor-gasto" type="number" placeholder="R$ 0,00" />
          <button id="btn-gasto" onclick="addGasto()">Adicionar</button>
        </div>

        <table>
          <tbody id="lista-gastos"></tbody>
        </table>
      </div>

      <!-- RESUMO -->
      <div id="resumo" class="tela card">
        <h2>Resumo</h2>

        <div class="cards">
          <div class="card-mini">
            Receitas<br />R$ <span id="total-receitas">0</span>
          </div>
          <div class="card-mini">
            Gastos<br />R$ <span id="total-gastos">0</span>
          </div>
          <div class="card-mini">
            Reserva<br />R$ <span id="reserva">0</span>
          </div>
          <div class="card-mini destaque">
            Saldo<br />R$ <span id="saldo">0</span>
          </div>
        </div>
        <canvas id="grafico"></canvas>
        <input id="percentual" type="number" placeholder="Reserva (%)" />
        <button onclick="salvarPercentual()">Salvar</button>
      </div>
    </div>
  </body>
</html>
